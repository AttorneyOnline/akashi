name: CI

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  formatting-check:
    name: check-clang-format
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run clang-format style check.
      uses: jidicula/clang-format-action@v4.5.0
      with:
        clang-format-version: '16'
        check-path: '.'
        
  build-linux:
    needs: formatting-check
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.1.*'
          version: '6.5.3'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          cache: true
          cache-key-prefix: install-qt-action
          modules: 'qtwebsockets'
          
      # Runs a set of commands using the runners shell
      - name: Build
        run: |
          cd $GITHUB_WORKSPACE
          cmake .
          cmake --build . --config Release
          
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: akashi-linux
          path: bin/
  
  build-windows:
    needs: formatting-check
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.5.3
          target: desktop
          arch: win64_mingw
          tools: 'tools_mingw1310'
          cache: true
          cache-key-prefix: install-qt-action
          modules: 'qtwebsockets'

      - name: Add MinGW to PATH
        run: echo "$Env:IQTA_TOOLS\mingw1310_64\bin" | Out-File -FilePath $Env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        run: |
          cd $Env:GITHUB_WORKSPACE
          cmake . -G "MinGW Makefiles" -D CMAKE_BUILD_TYPE=Release
          cmake --build . --config Release --parallel
          windeployqt bin\akashi.exe --release --no-translations --no-compiler-runtime --no-opengl-sw
          Copy-Item "$Env:IQTA_TOOLS\mingw1310_64\bin\libgcc_s_seh-1.dll" bin\
          Copy-Item "$Env:IQTA_TOOLS\mingw1310_64\bin\libstdc++-6.dll" bin\
          Copy-Item "$Env:IQTA_TOOLS\mingw1310_64\bin\libwinpthread-1.dll" bin\
          New-Item -ItemType Directory -Force -Path bin\sqldrivers | Out-Null
          Copy-Item "$Env:QT_ROOT_DIR\plugins\sqldrivers\qsqlite.dll" bin\sqldrivers\

      - name: List deployed files
        run: Get-ChildItem -Recurse bin\ | Select-Object FullName

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: akashi-windows
          path: bin\
